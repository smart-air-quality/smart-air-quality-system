version: '3.8'

services:
  backend:
    build: ./backend
    container_name: smart-air-quality-backend
    ports:
      - "8000:8000"
    environment:
      # External APIs
      - WAQI_TOKEN=${WAQI_TOKEN:-demo}
      - WEATHERAPI_KEY=${WEATHERAPI_KEY:-demo}
      
      - MYSQL_HOST=${MYSQL_HOST:-iot.cpe.ku.ac.th}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_PORT=3306
      
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    container_name: smart-air-quality-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
